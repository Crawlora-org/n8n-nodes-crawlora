name: Publish

# Publishes the package to npm with provenance when a v* tag is pushed.
# n8n's community-node verification (from 2026-05-01) requires provenance, which
# needs `id-token: write` + npm CLI >= 9.5 on a supported CI (GitHub Actions).
#
# One-time setup (owner): add an automation-type npm token as the `NPM_TOKEN`
# repository secret, then publish a release with:
#   npm version <patch|minor> && git push --follow-tags

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: read
  id-token: write

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          registry-url: 'https://registry.npmjs.org'
      - run: npm ci
      - run: npm run build
      - run: npm run smoke
      - run: npm publish --provenance --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
